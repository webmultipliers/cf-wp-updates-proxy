name: Deploy Worker

"on":
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger a deploy from the GitHub UI

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required secrets are configured
        id: secret-check
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "::notice::Deploy skipped: repository secrets not configured (set CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CONFIG_KV_NAMESPACE_ID)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build temporary deploy config with bindings
        if: steps.secret-check.outputs.skip == 'false'
        shell: bash
        env:
          CONFIG_KV_NAMESPACE_ID: ${{ secrets.CONFIG_KV_NAMESPACE_ID }}
        run: |
          set -euo pipefail

          if [[ -z "${CONFIG_KV_NAMESPACE_ID:-}" ]]; then
            echo "Missing required GitHub secret: CONFIG_KV_NAMESPACE_ID"
            exit 1
          fi

          cp wrangler.toml .wrangler-ci.toml
          printf '\n[[kv_namespaces]]\nbinding = "CONFIG_KV"\nid = "%s"\n' "${CONFIG_KV_NAMESPACE_ID}" >> .wrangler-ci.toml

      - name: Deploy with Wrangler
        if: steps.secret-check.outputs.skip == 'false'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config .wrangler-ci.toml --keep-vars
